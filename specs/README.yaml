# ─────────────────────────────────────────────────────────────────────────────
# specs/README.yaml
# O QUÊ:  Índice de todas as specs do Pitada. Spec vem sempre antes do código.
# USADO POR: qualquer pessoa/agente que vá implementar algo neste projeto.
# ─────────────────────────────────────────────────────────────────────────────
project: Pitada
descricao: >
  App pessoal de receitas, aprendizado, planos e compras. Flutter + Riverpod +
  go_router. Alvo visual = pitada.html. Regras em .claude/rules/.

convencao_de_nomes: >
  O caminho da spec ESPELHA o do código (lib/ <-> specs/, .dart <-> .yaml), com a mesma
  compartimentalização (máx. 7 soltos por pasta; quebra por papel, depois sub-domínio).
  Ex.: lib/core/widgets/tags/pitada_tag.dart -> specs/components/tags/pitada_tag.yaml
  Ver .claude/rules/nomenclatura-e-pastas.md e .claude/reestruturacao.md (migração viva).

design_system:
  - specs/design-system/colors.yaml        # tokens de cor  -> core/theme/colors.dart
  - specs/design-system/typography.yaml     # tipografia     -> core/theme/typography.dart
  - specs/design-system/spacing.yaml        # espaço/raio    -> core/theme/spacing.dart
  - specs/design-system/icons.yaml          # ícones Phosphor -> core/theme/app_icons.dart

components:                                 # -> lib/core/widgets/
  - specs/components/masthead.yaml
  - specs/components/section_header.yaml
  - specs/components/pitada_tabs.yaml   # abas de texto unificadas (ex-ChapterTabs/SegTabs)
  - specs/components/hairline_row.yaml
  - specs/components/pitada_button.yaml
  - specs/components/pitada_chip.yaml
  - specs/components/pitada_tag.yaml   # pílula colorida (tags coloridas)
  - specs/components/expiry_tag.yaml
  - specs/components/why_callout.yaml
  - specs/components/nutrition_card.yaml
  - specs/components/option_card.yaml
  - specs/components/check_item.yaml
  - specs/components/pitada_toggle.yaml   # toggle flat liga/desliga (átomo reusado)
  - specs/components/editable.yaml   # wrapper de gesto: segurar/duplo-clique -> edita 1 campo
  - specs/components/quick_edit_sheet.yaml   # sheet genérica de edição rápida (edição inline)
  - specs/components/edit_field.yaml   # campos de formulário (texto/stepper/casca) — promovidos p/ core
  - specs/components/atoms.yaml   # RecipeThumb, PitadaSearchField, FuelBar, StepProgress, EmptyState, PitadaScaffold

features:                                   # -> lib/features/<f>/presentation/
  - specs/features/recipes.yaml
  - specs/features/bancada.yaml             # fila "quero cozinhar em breve" (ex-aba "Favoritas")
  - specs/features/learning.yaml
  - specs/features/plans.yaml
  - specs/features/plans_progress.yaml    # sub-aba "Progresso": peso + aderência (log rápido do dia)
  - specs/features/shopping.yaml
  - specs/features/profile.yaml             # aba Perfil (ex-feature Home, feed abandonado)
  - specs/features/app_shell.yaml           # shell das 5 abas + dock flutuante
  - specs/features/auth.yaml                # entrar por e-mail + código (OTP) + gate no router

backend:                                    # -> supabase/ (migrations, config) — spec antes do SQL
  - specs/backend/supabase_setup.yaml       # CLI local, migrations, comandos, chaves via --dart-define
  - specs/backend/database.yaml             # schema Postgres (fatia Receitas) -> supabase/migrations/
  - specs/backend/rls.yaml                  # Row Level Security de TODAS as tabelas
  - specs/backend/auth.yaml                 # estratégia OTP por e-mail (passwordless, iOS-friendly)
  - specs/backend/storage.yaml              # bucket recipe-photos (privado) + paths + políticas
  - specs/backend/edge_functions.yaml       # contrato das functions de IA (Gemini no servidor) — TODO

dev:                                        # ferramentas de desenvolvimento (não são features)
  - specs/dev/device_preview.yaml

regras:
  - .claude/rules/arquitetura.md
  - .claude/rules/nomenclatura-e-pastas.md   # sufixos de papel, regra dos 7, specs espelham código
  - .claude/rules/specs-primeiro.md
  - .claude/rules/design-system.md
  - .claude/rules/comentarios-e-logs.md
