component: HairlineRow
prototype: ".rrow / .frow / .lrow / .srcrow (linha de lista separada por filete)"
purpose: Linha de lista genérica separada por filete inferior (sem card). Reuso central.
uses: [AppColors.line, AppColors.faint, AppSpacing]
api:
  - leading: Widget?        # thumb, ícone, checkbox
  - title: Widget           # obrigatório
  - subtitle: Widget?
  - trailing: Widget?       # seta, quantidade, tag
  - onTap: VoidCallback?
