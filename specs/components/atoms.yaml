# specs/components/atoms.yaml -> vários pequenos widgets em lib/core/widgets/
# Átomos reutilizáveis menores, agrupados numa spec só (cada um vira 1 arquivo .dart).
atoms:
  - component: RecipeThumb
    file: lib/core/widgets/recipe_thumb.dart
    prototype: ".rrow .th (miniatura colorida com ícone)"
    purpose: Quadrado colorido (hero_color) com ícone de prato — placeholder de foto.
    uses: [AppColors.hero, context.pit.card/border/text, AppSpacing.radiusMd/borderStrong]
    api: [color: Color, size: double = 54, icon: IconData?, outlined: bool = false]
    detalhes: >
      outlined=true é o modo soft neo-brutalista: para cores PASTÉIS
      (context.pit.card(hero)) — ganha borda tinta (pit.border, borderStrong) e o
      ícone passa a usar tinta do tema (o branco fixo some no pastel claro).
      outlined=false mantém o visual legado (cor cheia + ícone branco) usado nas
      listas do Caderno.
    used_by: [recipes_screen (RecipeRow, outlined), plans (add option, outlined), meal pickers]

  - component: PitadaSearchField
    file: lib/core/widgets/pitada_search_field.dart
    prototype: ".search (campo de busca com lupa)"
    purpose: >
      Campo de busca padrão (visual .search): uma cápsula com fundo único + borda.
      Reage ao tema via context.pit. O TextField interno leva filled:false para
      ANULAR o fillColor herdado do inputDecorationTheme global — sem isso ele
      pinta um 2º retângulo (surf2) dentro da cápsula. Estático por ora (frontend).
    uses: [context.pit.surf/border/muted/text/faint, AppColors.accent (cursor/marca), AppType.body, AppSpacing.borderStrong]
    api: [hint: String, controller: TextEditingController?, onChanged: ValueChanged<String>?]
    used_by: [recipes_screen]

  - component: FuelBar
    file: lib/core/widgets/fuel_bar.dart
    prototype: ".fuel (barra de combustível do dia)"
    purpose: Barra de progresso fina (verde sage) — quanto da meta foi atingido.
    uses: [AppColors.surf2, AppColors.sage, AppColors.accent2, AppSpacing]
    api: [progress: double 0..1, over: bool = false]  # over -> cor accent2
    used_by: [plans_screen]

  - component: StepProgress
    file: lib/core/widgets/step_progress.dart
    prototype: ".lsteps / .lstep (passos do carregamento de importação)"
    purpose: Lista de passos com bolinha marcada — feedback de processamento da IA.
    uses: [AppColors.line2, AppColors.sage, AppColors.faint, AppColors.text2, AppType.bodySm]
    api: [steps: List<String>, activeIndex: int]
    used_by: [import_sheet (receitas), add_pantry_sheet (compras)]

  - component: EmptyState
    file: lib/core/widgets/empty_state.dart
    prototype: "estados vazios/carregando (regra de qualidade do guia)"
    purpose: Estado vazio/carregando com texto que orienta a ação.
    uses: [AppColors.muted, AppColors.faint, AppType.title, AppType.bodySm, AppSpacing]
    api: [title: String, message: String?, icon: IconData?]
    used_by: [todas as listas quando vazias]

  - component: PitadaScaffold
    file: lib/core/widgets/pitada_scaffold.dart
    prototype: ".tab .scroll (estrutura de aba com masthead + conteúdo rolável)"
    purpose: Casca padrão de uma aba — fundo bg + coluna com slivers/rolagem.
    uses: [AppColors.bg, AppSpacing]
    api: [child: Widget, top: Widget?] # top fixo (masthead/thead), child rolável
    helpers:
      tabListPadding: >
        tabListPadding(context, {respiro = AppSpacing.xxl}) — padding inferior
        padrão das listas de aba: respiro + MediaQuery.padding.bottom. Com o
        shell em extendBody, o inset inferior inclui a altura da pílula
        flutuante; sem ele o fim da lista ficaria escondido sob a barra.
        Toda lista de aba usa este helper no lugar de EdgeInsets.only(bottom).
    used_by: [todas as telas de aba]

  - component: SheetGrip
    file: lib/core/widgets/sheet_grip.dart
    prototype: "barrinha central no topo dos bottom sheets"
    purpose: Grip de arraste padrão (36x5, line2) antes do título de todo sheet.
    uses: [context.pit.line2, AppSpacing.md]
    api: []
    detalhes: >
      Promovido de plans/ e recipes/ (existiam DUAS cópias iguais) para
      core/widgets — todo sheet do app usa o mesmo grip.
    used_by: [sheets de plans, recipes (import/cook_chat), shopping (nova lista)]
