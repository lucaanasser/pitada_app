# specs/features/plans.yaml -> lib/features/plans/
feature: Planos
prototype: "TAB-PLANOS + SHEET-MEAL + SHEET-ADDMEAL em pitada.html"
purpose: >
  Planejar o dia por refeições. Cada refeição tem uma meta de kcal e opções de
  cardápio; escolher uma opção soma para o total do dia contra a meta diária.
  Grama é a base; kcal e macros vêm das receitas.

data:
  models:
    - Plan:            # o plano ativo (um por vez)
        campos:
          - id: String
          - name: String            # rótulo interno ("Meu plano"); NÃO exibido na tela
          - dailyGoalKcal: int      # 1900
          - meals: List<Meal>
    - Meal:            # uma refeição do dia (Café, Almoço, Jantar, Lanche)
        campos:
          - id: String
          - name: String            # "Almoço"
          - goalKcal: int           # meta da refeição (650)
          - chosenIndex: int        # opção escolhida; -1 = nenhuma
          - options: List<MealOption>
    - MealOption:      # uma alternativa de cardápio p/ a refeição ("Opção N")
        campos:
          - items: List<MealOptionItem>
        derivado: "totalKcal = soma dos items.kcal"
    - MealOptionItem:  # um prato dentro da opção
        campos:
          - name: String
          - kcal: int
          - recipeId: String?       # preenchido => prato linkado (abrível)
  repository: PlansRepository        # em memória (seed) hoje; Supabase depois
  seed: plan_seed.dart               # "Meu plano" 1900; Café/Almoço/Jantar/Lanche (ver PLAN no protótipo)
  regras:
    - "Modelos: classes puras imutáveis, const constructor (como Recipe). Sem freezed/json."
    - "MealOptionItem.recipeId != null => item linkado (OptionDish.linked = true)."

application:
  providers:
    - plansRepositoryProvider (Provider<PlansRepository>)
    - planProvider (FutureProvider<Plan>)            # o plano ativo do usuário
    - dayTotalKcalProvider (Provider<int>)            # soma das opções escolhidas do dia
    - dayMacrosProvider (Provider<DayMacros>)         # Prot/Carb/Gord agregados (record simples)
  acoes:
    - "PlanController.chooseOption(mealId, optionIndex): marca a opção escolhida."
    - "PlanController.reorderMeals(oldIndex, newIndex): move a refeição para a
       posição final newIndex na lista do dia (arrastar-para-reordenar). Índices
       fora do intervalo são ignorados (aviso no log). Ligado ao
       ReorderableListView.onReorderItem (já entrega o índice final ajustado)."
  notas:
    - "Sem dias/log: a aba é só a lista do plano (o que se pretende comer), não um diário."
    - "dayTotalKcal soma optionTotal(chosenIndex) de cada Meal com chosenIndex >= 0."
    - "status do plano: 'Dentro da meta · sobram N kcal' se total<=meta; senão 'Acima da meta · N kcal a mais'."
    - "Números formatados via core/utils/format (formatKcal) e locale pt-BR (1.718)."

screens:
  - PlansScreen:
      file: lib/features/plans/presentation/plans_screen.dart
      tipo: ConsumerWidget
      prototype: ".tab#tab-planos (.today/.days/.meal/.addmeal)"
      fundo: pit.tabBg(2)   # pastel da aba — casa com a faixa do shell atrás do dock
      layout:   # de cima pra baixo — CABEÇALHO COMPARTILHADO + sub-abas (ver plans_progress.yaml)
        - Masthead
        - "título fixo 'Plano' (AppType.screenTitle) + PitadaIconButton '+' (filled,
           iconButtonSm) à direita -> showPlanAddSheet (mesmo padrão de Receitas/Caderno)"
        - "DaySummary (SEM caixa/borda, no cabeçalho fixo, acima das abas): total grande
           '1.718 / 1.900 kcal' (sem 'hoje' — é lista, não log), status 'Dentro da meta · sobram
           182 kcal', FuelBar(progress=total/meta, over=total>meta), macros Prot 128g / Carb 142g / Gord 47g.
           SEM título de plano — começa direto no número."
        - "PitadaTabs ['Cardápio', 'Progresso'] abaixo dos macros, alinhadas à
           ESQUERDA (como nas demais telas) e com respiro xl após os macros"
        - "sub-aba 0 = CardapioView; sub-aba 1 = ProgressView (peso + aderência, ver plans_progress.yaml)"
      cardapio_view:   # presentation/widgets/cardapio_view.dart — corpo da sub-aba 0
        - "lista REORDENÁVEL de MealCard (ReorderableListView shrinkWrap dentro do ListView da tela;
           buildDefaultDragHandles=false, proxyDecorator flat/sem sombra): um por Meal, ESTES sim em
           caixa/borda: cabeçalho editável (nome + lápis + pega de arrastar AppIcons.dragHandle à direita +
           'meta N kcal'), OptionCard por MealOption, HairlineRow/botão 'Adicionar opção' (abre showAddOptionSheet).
           Arrastar pela pega reordena via PlanController.reorderMeals."
        - "VISUAL do MealCard (soft neo-brutalismo, igual ao RecipeCard/NutritionCard):
           fundo pit.surf + borda TINTA (pit.border, AppSpacing.borderStrong) + raio
           AppSpacing.radiusCard. Nada de filete fino (pit.line) como borda de caixa.
           As opções dentro são blocos flat surf2 (ver specs/components/cards/option_card.yaml)."
        - "PitadaButton(outline) 'Adicionar refeição' -> showMealSheet(novo)"
      widgets_da_feature:   # em presentation/widgets/ (tela > 200 linhas => quebrar)
        - DaySummary          # total + status + FuelBar + legenda de macros (sem caixa)
        - MealCard            # cabeçalho da refeição + OptionCards + 'Adicionar opção'
        - MealHeaderRow       # nome editável (toca -> showMealSheet) + pega de arrastar + meta em kcal
      navega: RecipeDetailScreen (/recipe/:id)  # ao tocar prato linkado numa OptionCard

sheets:
  - showPlanAddSheet:
      file: lib/features/plans/presentation/sheets/plan/plan_add_sheet.dart
      assinatura: "void showPlanAddSheet(BuildContext context)"
      proposito: >
        Atalho do '+' do cabeçalho. NÃO substitui os botões existentes — só
        reúne os mesmos fluxos num lugar. Usa o AddOptionsSheet compartilhado.
      conteudo:
        - "título 'Adicionar ao Plano'"
        - "Nova refeição (clay, AppIcons.dish) -> showMealSheet (mesmo do botão do Cardápio)"
        - "Registrar refeição (ochre, AppIcons.logDay) -> showLogDaySheet (mesmo da TodaySection)"
        - "Registrar peso (teal, AppIcons.weight) -> showLogWeightSheet (mesmo do Progresso)"
  - showMealSheet:
      file: lib/features/plans/presentation/sheets/plan/meal_sheet.dart
      assinatura: "void showMealSheet(BuildContext context, {Meal? meal})"
      prototype: ".sheet#sheet-meal"
      proposito: "Nova refeição ou editar existente."
      conteudo:
        - grip
        - "título: 'Nova refeição' (meal==null) ou 'Editar refeição'"
        - "campo nome (hint 'Ex.: Pré-treino')"
        - "campo meta kcal (numérico, hint 'kcal')"
        - "PitadaButton(primary) 'Salvar'"
        - "se editando: ação 'Remover refeição' (texto, cor accent2) -> exclui"
  - showAddOptionSheet:
      file: lib/features/plans/presentation/sheets/plan/add_option_sheet.dart
      assinatura: "void showAddOptionSheet(BuildContext context, {required Meal meal})"
      prototype: ".sheet#sheet-addmeal (openAddOption/pickOption)"
      proposito: "Escolher uma receita salva como nova opção da refeição."
      conteudo:
        - grip
        - "título 'Nova opção · <nome da refeição>' + subtítulo 'Escolha uma receita salva para a opção'"
        - "lista de receitas salvas (recipesProvider): RecipeThumb (pastel pit.card(hero),
           outlined) /HairlineRow com nome, kcal e
           selo de encaixe: 'cabe' (sage) se recipe.kcal<=meta.goalKcal, senão '+N' (accent2)"
        - "tocar => adiciona MealOption com o item da receita e fecha"

components_reutilizados: [Masthead, SectionHeader, HairlineRow, OptionCard,
  FuelBar, RecipeThumb, PitadaSearchField, PitadaButton, PitadaIconButton, EmptyState]

usa_de_outras_features:
  - recipes/application/recipes_providers.dart (recipesProvider)  # lista p/ showAddOptionSheet
  - navegação a /recipe/:id (RecipeDetailScreen) em pratos linkados
