# specs/features/recipes.yaml -> lib/features/recipes/
feature: Receitas
prototype: "TAB-RECEITAS, VIEW-RECIPE, VIEW-EDIT, VIEW-COOK, VIEW-FOLDER, SHEET-IMPORT, SHEET-COOKCHAT"
purpose: Guardar, ver, editar, cozinhar e importar receitas. Grama é a base.

data:
  models: [Recipe, Ingredient, RecipeStep, Folder]
  models_impl: >
    freezed + json_serializable (regra de architecture.md). fromJson/toJson com
    field_rename snake (camelCase Dart <-> snake_case Postgres, ver
    specs/backend/database.yaml). Recipe.fromJson aceita o embedding do
    PostgREST (recipe_ingredients/recipe_steps/recipe_folders aninhados).
  model_helpers:
    - Recipe.copyWith(...)   # gerado pelo freezed (edição inline)
    - Recipe.withVersionIdentity(...)  # método custom (construtor privado Recipe._())
  repository: >
    RecipesRepository (ABSTRATO) + 2 impls: SeedRecipesRepository (em memória,
    preview PC — comportamento abaixo) e SupabaseRecipesRepository (online,
    Postgres com RLS). main.dart escolhe via override do recipesRepositoryProvider
    quando SupabaseService.initIfConfigured() == true.
  repository_supabase:            # data/repositories/supabase_recipe_repository.dart
    leitura: >
      1 query com embedding: from('recipes').select('*, recipe_ingredients(*),
      recipe_steps(*), recipe_folders(folder_id)'). fetchRecipes filtra as
      DEFINITIVAS (linhas cujo id == id canônico do grupo, ver versões abaixo);
      ingredientes/passos ordenados por position.
    escrita: >
      updateRecipe = upsert de recipes + delete/insert das filhas (ingredientes/
      passos/pastas). saveAsNewVersion replica a lógica do seed: arquiva a
      definitiva como linha própria e promove a edição no id canônico.
  edicao_inline:                  # persistência MOCK das edições da sessão (impl seed)
    overrides: >
      Um mapa em memória id -> Recipe guarda o que foi editado/adicionado. fetchById e
      fetchVersionGroup consultam o override ANTES do seed (aceitam ids novos, ex.: um
      snapshot arquivado). fetchRecipes itera só as definitivas do seed aplicando override.
      updateRecipe(Recipe) grava o override e loga (AppLog.i 'recipes'). Vira Supabase depois.
    salvar_como_nova_versao:      # switch da QuickEditSheet -> repository.saveAsNewVersion
      quando_desligado: updateRecipe — sobrescreve a receita no lugar (mesmo id).
      quando_ligado: >
        saveAsNewVersion(edited) versiona "trocar tudo": (1) o id do GRUPO é o id canônico
        da definitiva (sem grupo ainda, o próprio id vira o grupo); (2) arquiva a definitiva
        ATUAL sob id derivado '{canonical}-v{n}' (mesma versão, sem folderIds);
        (3) promove a edição a nova definitiva no id canônico, com version = maxVersion+1,
        herdando folderIds. A tela então passa a ter grupo (2+) e mostra a
        RecipeVersionTag + seletor. A NOTA "o que mudou" não é criada aqui (mora no Caderno,
        fonte única) — sem nota, o seletor mostra só os rótulos das versões.
      helper_modelo: Recipe.withVersionIdentity({id, version, versionGroupId, folderIds})
  seed: recipe_seed.dart           # DEFINITIVAS: Frango xadrez(v3), Bowl, Strogonoff(v2), Panqueca
  seed_versions: recipe_versions_seed.dart    # snapshots ANTIGOS (Frango v1/v2, Strogonoff v1)
  seed_frameworks:                # framework_seed.dart — ANDAIME TEMPORÁRIO, apagar
    file: lib/features/recipes/data/seed/framework_seed.dart
    proposito: >
      Existe só p/ ver o card, a planta baixa e o detalhe do framework com
      conteúdo real no preview do PC. NÃO É PRODUTO: no app o primeiro framework
      nasce da pessoa, que nomeia o padrão — nomear é o ato de aprendizado, e a
      IA nunca rotula. Apagar antes de valer; SeedFrameworksRepository._session
      volta a começar vazia e a tab exibe o EmptyState didático.
    conteudo: >
      3 frameworks cujos recipeIds apontam p/ o recipe_seed: "Selar e montar
      molho na mesma panela" (frango-xadrez + strogonoff, o par que já divide
      técnicas), "Bowl montado por camadas" (bowl-quinoa) e "Massa rápida de
      frigideira" (panqueca-banana).
  versoes:                        # "trocar tudo" — cada versão é um Recipe COMPLETO
    campos_recipe:                # Recipe ganha 2 campos p/ agrupar versões:
      - version: int (default 1)              # número da versão (1,2,3…) -> rótulo "V3"
      - versionGroupId: String? (default null) # null = receita sem versões; senão, id do grupo
    modelo: >
      Cada versão é um Recipe INTEIRO (ingredientes/passos/macros próprios) e todos os
      snapshots do mesmo prato compartilham o versionGroupId. A DEFINITIVA (maior version)
      mantém o id canônico (ex.: 'frango-xadrez') p/ não quebrar links; as antigas usam
      ids derivados ('frango-xadrez-v1'). Só a definitiva carrega folderIds —
      versões antigas ficam fora de listas/pastas.
    repository:
      - fetchRecipes()      -> só DEFINITIVAS (uma por grupo)  # listas não duplicam
      - fetchById(id)       -> qualquer versão (inclui antigas) # /recipe/frango-xadrez-v1
      - fetchVersionGroup(groupId) -> todas as versões do grupo, ordenadas por version asc
    consistencia_caderno: >
      As "versões" são as MESMAS do Caderno. O CONTEÚDO (ingredientes/passos) vem daqui
      (recipes); as NOTAS "o que mudou" continuam fonte única no Caderno
      (RecipeVersion.timeline, learning). A tela lê versionForRecipeProvider(definitivaId)
      p/ mostrar a nota de cada versão no seletor. Labels casam: version N <-> 'vN'.

application:
  providers:
    - recipesProvider (FutureProvider<List<Recipe>>)
    - foldersProvider
    - selectedFolderProvider (StateProvider<int>)  # 0 = Todas
    - recipeSearchQueryProvider (StateProvider<String>)
    - recipeFiltersProvider (StateProvider<RecipeFilters>)  # maestria/tempo/kcal + ordem
    - recipeFiltersOpenProvider (StateProvider<bool>)       # painel colapsado/aberto
    - filteredRecipesProvider   # busca -> filtros -> ordem
    - recipeByIdProvider (family)
    - recipeVersionGroupProvider (family<List<Recipe>, String groupId>)  # versões do grupo (asc)
    - selectedRecipeVersionProvider (StateProvider.family<int?, String groupId>)  # versão vista (null = definitiva)
    - folderByIdProvider (family)                   # pasta única, para FolderScreen
    - recipesInFolderProvider (family)              # receitas de uma pasta (por folderId)
    - recipeEditControllerProvider (Provider<RecipeEditController>)  # edição inline
  controllers:
    - RecipeEditController.save(Recipe, {bool asNewVersion}): >
        Persiste a receita editada e invalida os providers dependentes (recipeByIdProvider,
        recipesProvider, recipeVersionGroupProvider do grupo) — a tela reflete na hora.
        asNewVersion=false -> updateRecipe (no lugar); true -> saveAsNewVersion (versiona).
        O grupo a invalidar é versionGroupId (ou o próprio id, quando cria o 1º grupo).

routes:                             # eu ligo no router depois; garanta nome/assinatura
  paths:
    - {path: /recipe/:id,      screen: RecipeDetailScreen(recipeId)}   # ja existe
    - {path: /recipe/:id/edit, screen: RecipeEditScreen(recipeId)}     # recipeId nulo = criar
    - {path: /recipe/:id/cook, screen: CookModeScreen(recipeId)}
    - {path: /folder/:id,      screen: FolderScreen(folderId),
       page: CustomTransitionPage NÃO-opaca (ver FolderScreen.animacao) — a aba
             Pastas fica visível por baixo durante abrir/fechar}
  functions:                        # sheets expostas como showXxxSheet(BuildContext)
    - showImportSheet(BuildContext)                 # import_sheet.dart
    - showCookChatSheet(BuildContext, recipe)       # cook_chat_sheet.dart

screens:
  - RecipesScreen:
      layout: [Masthead, thead("Receitas" + '+'), FolderCoverRow, RecipeSearchField,
               RecipeFilterPanel (colapsado), PitadaTabs([Receitas, Frameworks]),
               lista de RecipeRow | FrameworksTabView]
      # "Receitas Salvas" removida: manuais + importadas convivem em "Receitas".
      busca_e_filtros: >
        RecipeSearchField é lupa + campo sobre filete (sem caixa), e carrega no FIM
        da barra um ícone de filtro (AppIcons.tune) que COLAPSA/expande o painel —
        o traço minimalista: nenhuma camada nova, o painel empurra a lista.
        O ícone fica accent quando há filtro ativo e ganha um ponto accent (badge)
        para dizer "tem coisa ligada aqui embaixo" mesmo colapsado.
      filtros: >
        RecipeFilterPanel: seleção múltipla dentro de cada eixo, E entre eixos
        (maestria E tempo E kcal). Só aparece no tab Receitas — Frameworks não
        filtra. VISUAL: nada de cápsula — cápsula é só TAG (ver
        specs/components/tags/pitada_tag.yaml: regra_de_uso); um filtro é
        SELETOR. Cada opção é TEXTO no traço do PitadaTabs logo abaixo: ligada
        em pit.text com filete accent (borderAccent) embaixo, desligada em
        pit.muted, sem moldura. Eixos:
          - maestria: [nunca fiz, fiz 1-2×, domino]  # o eixo do projeto, no lugar de dificuldade
          - tempo:    [até 30 min, 30-60 min, 1h+]   # de recipe.timeMinutes; sem tempo = fora
          - kcal:     [até 400, 400-700, 700+]       # por porção, de recipe.kcal
        "Limpar" aparece só quando há filtro ativo e zera todos os eixos + a ordem.
      ordenacao: >
        Uma linha de chips no mesmo painel, seleção ÚNICA (não é filtro, é ordem):
          - atividade (padrão): última atividade real do caderno primeiro, acervo depois
          - recentes: ordem em que foi adicionada ao acervo (mais nova primeiro)
          - A-Z: alfabética por título
      abas: >
        Hoje 2 abas fixas: [Receitas, Frameworks] (recipesTabIndexProvider). As pastas
        saíram das abas e viram capas no topo (FolderCoverRow). A antiga "Favoritas" foi
        REMOVIDA (feature legada apagada: bool recipe.favorite, filtro, EmptyState e botão
        de coração na galeria). "Favoritar de verdade" vira uma PASTA comum criada pelo
        usuário. A BANCADA (fila "quero cozinhar em breve") tem desenho em
        specs/features/bancada.yaml; entra quando a Bancada for implementada.
      recipe_row: >
        Linha da lista densa: RecipeThumb PASTEL (context.pit.card(hero)) com
        outlined=true (borda tinta) — a cor cheia legada (AppColors.heroOf) saiu
        da aba Receitas; o pastel + borda casa com o RecipeCard e o restante do app.
        Título + meta em texto (recipe_meta_text) + seta.
      alternador_de_layout: >
        RecipeViewToggle (single/grid/list) no cabeçalho da lista — SEM moldura de
        pílula; uma "gota" accentSoft escorrega sob o ícone ativo (easeOutBack) com
        um squash-stretch suave no caminho (molejo leve), e a cor dos ícones anima
        junto (muted -> accent).
      navega: RecipeDetailScreen (/recipe/:id), showImportSheet (via '+')
      # Perfil saiu do thead: agora é aba própria na barra (specs/features/app_shell.yaml)
      aba_pastas:   # FoldersGrid -> FolderCard (folder_card.dart + folder_painter.dart)
        folder_card: >
          Card de pasta: silhueta pastel do hero com aba, papéis off-white saindo
          de dentro e BOLSO frontal cobrindo a metade de baixo (seam em 0.50h) —
          bolso mais alto p/ dar respiro à "boca" e caber título em 2 linhas.
          Nome no bolso em AppType.titleXs (14, Space Grotesk), até 2 LINHAS antes
          do "..."; contagem "N receitas" em captionSm logo abaixo. Padding inferior
          do texto = sm (bolso curto). Press: encolhe o card (0.97) e levanta os
          papéis (lift 0..6px).

  - RecipeDetailScreen:
      # meta = TEXTO sóbrio "N porções · tempo · dificuldade" (bodySm, pit.text2) —
      # métrica nunca vira cápsula (ver specs/components/tags/pitada_tag.yaml: regra_de_uso);
      # cápsulas no detalhe só nas TAGS de técnicas.
      titulo_com_versao: >
        A linha do título é [título + RecipeVersionTag] quando a receita tem grupo de
        versões (2+ snapshots). A tag é "V3" em ACCENT (terracota) + caret, TOCÁVEL —
        abre showRecipeVersionSheet. O corpo inteiro (kcal, macros, ingredientes, passos)
        reflete a VERSÃO SELECIONADA (selectedRecipeVersionProvider, default = definitiva).
        Trocar de versão troca a tela inteira. Ações da barra (Cozinhar/editar) usam o id
        da versão vista. Receita sem versões: título simples, sem tag.
      layout: [galeria, [título + RecipeVersionTag "V3"], fonte clicável,
               meta em texto(porções/tempo/dificuldade),
               NutritionCard, nota de conversão, SectionHeader Ingredientes -> IngredientRow,
               SectionHeader "Modo de preparo" -> StepTile(+WhyCallout),
               SectionHeader "Técnicas" -> PitadaChip, "Anotações" (texto),
               barra inferior: Cozinhar + ícones]
      # Toggle "pôr na bancada" na barra inferior entra com a implementação da Bancada
      # (ver specs/features/bancada.yaml: integracoes.entrada).
      navega: CookModeScreen (/recipe/:id/cook via "Cozinhar"), RecipeEditScreen (/recipe/:id/edit via ícone lápis),
              showRecipeVersionSheet (tocar na RecipeVersionTag)
      edicao_inline:   # "tudo é editável" — dois caminhos, ver specs/components/controls/editable.yaml
        principio: >
          O ícone LÁPIS (galeria) abre o editor INTEIRO (RecipeEditScreen). SEGURAR ou
          CLICAR DUAS VEZES em um elemento abre a edição só DAQUELE campo (Editable +
          QuickEditSheet via RecipeQuickEdit). Salvar persiste (RecipeEditController) e a
          tela atualiza na hora. O lápis, hoje solto, passa a ser ligado (onEdit -> /edit).
        switch_nova_versao: >
          TODA sheet de edição inline traz um switch "Salvar como nova versão" (default
          DESLIGADO). Desligado: sobrescreve no lugar. Ligado: cria uma nova versão
          (ver data.edicao_inline.salvar_como_nova_versao) e a tela passa a mostrar o
          seletor de versões.
        campos_editaveis:
          - título              -> QuickEdit 1 campo (Nome)
          - kcal                -> QuickEdit 1 campo numérico
          - porções/tempo/dificuldade -> RecipeMeta: cada segmento é um Editable próprio
          - macros              -> NutritionCard: cada célula (Proteína/Gordura/Carbo) é Editable
          - ingrediente         -> IngredientRow: QuickEdit 4 campos (nome/gramas/qtd/unidade)
          - passo               -> StepTile: QuickEdit 2 campos multiline (passo / "Por quê")
          - técnicas            -> QuickEdit 1 campo multiline (uma técnica por linha)
          - anotações           -> QuickEdit 1 campo multiline

  - RecipeEditScreen:
      classe: RecipeEditScreen extends ConsumerStatefulWidget  # controllers locais editáveis
      arquivo: presentation/recipe_edit_screen.dart
      widgets_proprios: presentation/widgets/edit_photo_strip.dart, edit_field_row.dart,
                        edit_ingredient_editor.dart, edit_step_editor.dart
      construtor: RecipeEditScreen({required String? recipeId})  # nulo = criar nova
      estado: carrega Recipe de recipeByIdProvider (ou branco); mantém rascunho local em memória
      layout:
        top (PitadaScaffold.top): edhead = linha "Cancelar" (esq, PitadaChip/texto -> context.pop)
              + "Editar receita"/"Nova receita" (centro) + "Salvar" (dir, accent -> salva e pop)
        child (rolável):
          - EditPhotoStrip: fotos horizontais (RecipeThumb por foto) + tile "＋ Adicionar foto"
                            (mock: só adiciona placeholder; câmera/galeria atrás de service depois)
          - EditFieldRow "Nome": PitadaSearchField/campo de texto (controller)
          - EditFieldRow "Pasta": abre seletor de pasta (lista de foldersProvider, multiescolha) -> PitadaChip por pasta
          - EditFieldRow "Porções": stepper − N + (usa PitadaIconButton, AppType.numeral)
          - EditFieldRow "Tempo (min)": stepper − N + ou campo numérico
          - SectionHeader "Ingredientes" -> EditIngredientEditor:
              por linha: nome + gramas + humanQty + humanUnit (HairlineRow com campos) + remover (ícone)
              rodapé: PitadaButton(outline) "＋ Ingrediente"
          - SectionHeader "Modo de preparo" -> EditStepEditor:
              por passo: número + texto (multiline) + tip opcional ("Por quê") + remover
              rodapé: PitadaButton(outline) "＋ Passo"
      salvar: monta Recipe imutável a partir do rascunho e chama repository (mock: log via AppLog + pop);
              AppLog.i('recipes', 'receita salva: <id>')
      navega: volta para RecipeDetailScreen ao salvar/cancelar (context.pop)

  - CookModeScreen:
      classe: CookModeScreen extends ConsumerStatefulWidget  # guarda índice do passo atual
      arquivo: presentation/cook_mode_screen.dart
      widgets_proprios: presentation/widgets/cook_step_view.dart, cook_nav_bar.dart
      construtor: CookModeScreen({required String recipeId})
      estado: currentIndex (0..steps.length-1); passos de recipeByIdProvider(recipeId)
      layout:
        chrome: tela cheia (Scaffold bg), sem tab bar
        top: linha "Fechar"(X -> context.pop) + StepProgress(steps rótulos curtos, activeIndex currentIndex)
        child: CookStepView do passo atual:
          - "Passo N de M" (AppType.label, versalete)
          - texto do passo grande e arejado (AppType.titleSm/body)
          - WhyCallout quando o passo tem tip
        bottom: CookNavBar:
          - "Voltar" (PitadaButton outline; desabilitado no passo 0)
          - "Próximo" (PitadaButton primary) que avança; no ÚLTIMO passo vira "Concluir"
      ao_concluir: no último passo, "Concluir" chama showCookChatSheet(context, recipe: recipe)
                   (feedback pós-cozimento); AppLog.i('recipes', 'cozimento concluído: <id>')
                   # markCooked na bancada entra com a implementação da Bancada (bancada.yaml)

  - FolderScreen:
      classe: FolderScreen extends ConsumerWidget      # SEM controller próprio: a rota anima
      arquivo: presentation/folder_screen.dart
      widgets_proprios: presentation/widgets/paper_fly.dart   # PaperFly + FolderMotion + BottomOpenClipper
      construtor: FolderScreen({required String folderId})
      estado: pasta/receitas de foldersProvider + recipesProvider (filtro por folderId)
      layout:
        top: linha mínima seta "voltar" (-> context.pop) + rótulo 'PASTA'
        child: grade 2 colunas de RecipeCard compacto ("papéis") -> /recipe/:id;
               EmptyState quando vazia (title "Pasta vazia", icon folder,
               message "Adicione receitas a esta pasta.")
        bottom: faixa da pasta (cor pastel do hero + sombra funcional p/ cima) com
                nome + contagem + PitadaIconButton(add)
      animacao:   # abrir/fechar = UMA animação contínua, dirigida pela ROTA (nunca 2 fases)
        rota: CustomTransitionPage não-opaca; transitionsBuilder devolve o child puro —
              a tela lê ModalRoute.of(context).animation e dirige o próprio visual
        duracoes: FolderScreen.openDuration (460ms) / closeDuration (380ms)
        principio: a faixa da pasta NUNCA fica translúcida — a oclusão dos papéis
                   depende dela sólida; ela DESLIZA de baixo, não dissolve
        coreografia: intervalos/vetores centralizados em FolderMotion (paper_fly.dart)
        abrir: aba Pastas segue visível POR BAIXO; a faixa desliza de baixo primeiro
               (0–15%, easeOutCubic) e fundo (pit.bg) + topo dissolvem por cima (0–45%);
               os papéis SÓ começam depois da faixa assentar (start 12% + 4,5%/índice,
               cap 42%; janela de 50%), saindo da boca escalonados e
               desentortando/escalando até o slot da grade (easeOutCubic)
        fechar: context.pop() reverte a MESMA animação com reverseCurve própria —
                fundo + topo dissolvem logo (100%→55%) enquanto os papéis mergulham
                na faixa escalonados (mais fundo volta primeiro; todos dentro até 15%)
                e a faixa, ainda sólida, desliza p/ baixo por último (15%→0),
                "engolindo" tudo; proibido animar papéis primeiro e trocar de página depois
        papel_opacidade: gate curto (primeiros ~12% do próprio trecho) só para evitar
                         pop de 1 frame na boca — a oclusão real é a faixa sólida
        gesto_voltar: sem PopScope — o back do sistema já reverte a rota corretamente
      adicionar: ícone '+' na faixa (mock: AppLog até existir o seletor de receitas)
      navega: RecipeDetailScreen (/recipe/:id)

sheets:
  - ImportSheet:
      funcao: showImportSheet(BuildContext)   # showModalBottomSheet padrão (surf, radiusXxl, grip)
      arquivo: presentation/import_sheet.dart
      classe_interna: _ImportSheet extends ConsumerStatefulWidget  # controla o estágio
      widgets_proprios: presentation/widgets/import_source_grid.dart, import_preview.dart
      servico: >
        RecipeImportService (application) atrás de interface: MockRecipeImportService
        (preview PC, rascunho de exemplo) e GeminiRecipeImportService (online, chama a
        Edge Function import-recipe — ver specs/backend/edge_functions.yaml). Ligado via
        override de recipeImportServiceProvider no main.dart quando online.
      estagios (enum ImportPhase: idle/choose, loading, ready/preview, error):
        1. choose  -> "De onde vem a receita?" + ImportSourceGrid:
              - campo de link (PitadaSearchField) + PitadaButton "Importar link" quando há texto:
                deduz o RecipeSource pela url (instagram/youtube/site) e chama startFrom
              - card PDF -> file_picker (withData) -> base64 -> startFrom(source: pdf, content)
              - card Escrever -> startFrom(source: manual) = rascunho em branco (sem rede)
              - card "Novo Framework" (largura cheia, abaixo da fileira) -> fecha a sheet
                e navega p/ /framework/new; é o ÚNICO ponto de criação de framework
                (a tab Frameworks não tem mais botão próprio)
        2. loading -> StepProgress(['Lendo','Extraindo','Estruturando']); passos são cosméticos
              enquanto a importação real roda; AppLog.d('recipes', 'import iniciado: <source>')
        3. ready -> ImportPreview: rascunho editável (nome, porções, ingredientes, passos);
              rodapé "Salvar receita" -> RecipeEditController.create(draft.toRecipe()) grava
              uma receita NOVA e invalida recipesProvider; AppLog.i('receita importada salva: <id>')
        4. error -> mensagem + PitadaButton "Tentar de novo" (retry) + "Escolher outra fonte" (reset)
      fatia_atual: site | instagram | pdf | manual   # foto/youtube-como-card ficam p/ depois
      nota: >
        arquivo (file_picker) e rede (Edge Function) atrás de service abstrato (real + mock).
        Compartilhamento do SO (ACTION_SEND do Instagram/navegador) é fatia futura — exige
        criar android/ + intent-filter; hoje a entrada é colar o link ou escolher o PDF.

  - CookChatSheet:
      funcao: showCookChatSheet(BuildContext, {required Recipe recipe})   # sheet padrão (surf, grip)
      arquivo: presentation/cook_chat_sheet.dart
      classe_interna: _CookChatSheet extends StatefulWidget  # guarda feedback + sugestão gerada
      widgets_proprios: presentation/widgets/cook_feedback_options.dart
      abre: ao concluir o CookModeScreen (última etapa)
      layout:
        - grip + título "Como ficou?" (AppType.title) + subtítulo (AppType.body, muted)
        - CookFeedbackOptions: 4 escolhas exclusivas (PitadaChip/HairlineRow com CheckItem):
              "Ficou salgado", "Faltou cozimento", "Ficou seco", "Perfeito"
        - ao escolher (≠ perfeito): mostra WhyCallout com a sugestão de ajuste
              (label "Ajuste sugerido", ex.: salgado -> "Reduza o sal em ~20% na próxima")
              mock: mapa fixo feedback -> sugestão; AppLog.i('recipes', 'feedback: <opção>')
        - "Perfeito": mensagem curta de parabéns, sem sugestão
        # seção "Voltar pra bancada?" entra com a implementação da Bancada (bancada.yaml)
        - rodapé: PitadaButton "Salvar ajuste na receita" (só quando há sugestão) ->
              anexa a sugestão às Anotações da receita (repository/mock) e fecha;
              PitadaButton(outline) "Fechar" quando não há ajuste a salvar

  - RecipeVersionSheet:
      funcao: showRecipeVersionSheet(BuildContext, {versions, selected, changelog, onSelect})
      arquivo: presentation/recipe_version_sheet.dart   # showPitadaSheet + SheetGrip
      abre: ao tocar na RecipeVersionTag do título (RecipeDetailScreen)
      layout:
        - grip + título "Versões"
        - lista das versões, MAIS RECENTE primeiro (v3, v2, v1); cada linha:
            "V{n}" (numeralSm accent na atual, pit.text nas outras) + chip "atual" na
            definitiva + nota "o que mudou" (do changelog do Caderno, casada por label);
            a selecionada tem realce (accentSoft). Tocar -> onSelect(n) e fecha.
        - rodapé (se houver changelog): HairlineRow/link "Ver histórico completo" ->
            context.push('/versions/<changelog.id>')  (VersionHistoryScreen do Caderno)
      nota: >
        Conteúdo (macros/ingredientes) vem das versões (recipes); a NOTA vem do Caderno
        (fonte única). Sem changelog, a lista mostra só os rótulos das versões.

feature_widgets:                    # widgets exclusivos da feature (presentation/widgets/)
  - QuickEditSheet: >
      Bottom sheet genérica de edição rápida (1+ campos) usada pela edição inline do
      detalhe. Ver specs/components/quick_edit_sheet.yaml. arquivo: widgets/quick_edit_sheet.dart
  - RecipeQuickEdit: >
      Orquestrador da edição inline: um método por campo (title/kcal/servings/time/
      difficulty/macro/ingredient/step/techniques/notes) — abre a QuickEditSheet, monta o
      Recipe editado (copyWith) e chama RecipeEditController.save. arquivo: recipe_quick_edit.dart
  - RecipeVersionTag: >
      Marcador "V3" da versão atual ao lado do título, em ACCENT (terracota) + caret,
      tocável (abre o seletor). Reusa AppType.numeralSm + AppColors.accent + AppSpacing.
      Só aparece quando a receita tem 2+ versões. arquivo: widgets/recipe_version_tag.dart

components_reutilizados: [Masthead, PitadaScaffold, PitadaSearchField, PitadaTabs,
