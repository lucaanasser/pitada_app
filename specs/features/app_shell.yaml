# specs/features/app_shell.yaml -> lib/core/router/*
feature: AppShell
purpose: >
  Casca de navegação com 5 abas persistentes + rotas full-screen. A aba Home
  (comunidade/posts) foi abandonada; Perfil entrou na barra no lugar dela
  (última posição, convenção de apps atuais) e deixou de ser rota full-screen.

router:
  package: go_router
  type: StatefulShellRoute.indexedStack   # cada aba mantém sua pilha
  branches:                               # ordem = índice da barra = índice de pit.tabBg
    - {path: /recipes,  screen: RecipesScreen}
    - {path: /learning, screen: LearningScreen}   # aba 'Caderno'
    - {path: /plans,    screen: PlansScreen}
    - {path: /shopping, screen: ShoppingScreen}
    - {path: /profile,  screen: ProfileScreen}    # aba 'Perfil' (ex-full-screen)
  fullscreen:                              # cobrem a barra (rootNavigator)
    - {path: /recipe/:id, screen: RecipeDetailScreen}
    # ...demais rotas de detalhe/edição em routes.dart (specs de cada feature)

shell:
  file: lib/core/router/app_shell.dart
  fundo: pit.tabBg(abaAtual)               # pastel da aba atual (mesmo das telas)
  extendBody: true                          # corpo se estende ATRÁS da barra
  transicao_de_aba: >
    Ao trocar de aba, o conteúdo entra deslizando (_SlideTabView): pela direita
    se a aba nova está À DIREITA da atual, pela esquerda se está à esquerda
    (FractionalTranslation dirigida por um AnimationController, ~300ms
    easeOutCubic). O IndexedStack segue por baixo, então o estado/scroll de cada
    aba é preservado — só o quadro de entrada desliza.
  nota: >
    Com extendBody, o conteúdo rola por baixo da pílula — flutuação de verdade,
    sem "moldura"/faixa atrás dela (feedback do dono). O Scaffold publica a
    altura da barra como MediaQuery.padding.bottom; as listas de aba somam esse
    inset via tabListPadding (ver specs/components/layout/pitada_scaffold.yaml) para o fim da
    lista não ficar escondido. Toda tela de aba usa
    PitadaScaffold(background: pit.tabBg(índice)).

tab_bar:                                   # "pílula fantasma" — spec própria (widget de core/)
  spec: specs/components/tabs/pitada_tab_bar.yaml
  file: lib/core/widgets/tabs/pitada_tab_bar.dart
  ordem: [Receitas, Caderno, Plano, Ingredientes, Perfil]   # a ordem = índice do branch/pit.tabBg

used_by: [app.dart]
