# specs/design-system/icons.yaml -> lib/core/theme/app_icons.dart
token_class: AppIcons
pacote: "phosphoricons_flutter ^1.0.0"   # Phosphor, compat. Dart 3 (IconData é final)
api_pacote: "PhosphorIconsRegular.<nome> (inativo) · PhosphorIconsFill.<nome> (ativo)"
purpose: >
  Tokens de ícone nomeados por significado. Fonte única — nenhum Icons.* ou ícone
  solto fora daqui. Trocar de família = mexer só neste arquivo + pubspec.

navegacao:      # regular (inativo) + *Fill (ativo) — ordem da barra
  recipes:  forkKnife
  learning: chefHat           # aba Caderno (antes notebook); notebook segue p/ EmptyState
  plans:    clipboardText     # aba Plano — "o plano escrito" (prancheta). Antes
                              # bowlSteam, que era o 4º ícone de comida da barra e
                              # lia como "receitas de novo"; antes disso, calendarBlank.
  ingredients: carrot         # aba Ingredientes (antes "Compras"/shoppingCart)
  profile:  user            # aba Perfil (home/house saiu com a aba de comunidade);
                            # o regular também serve de chip de pessoa (note_row)

acoes:
  back:      arrowLeft
  edit:      pencilSimple
  cook:      fire           # favorite/heart REMOVIDO com a feature de favoritos
  bookmark:  bookmarkSimple  # "pôr na bancada" — ADICIONAR bookmarkFill (ativo) na impl. da Bancada
  addToList: shoppingCartSimple
  addToPlan: calendarPlus
  add:       plus
  search:    magnifyingGlass
  chevron:   caretRight
  expand:    caretDown      # título-seletor que abre sheet (ex.: lista ativa)
  link:      link
  folder:    folderOpen
  dragHandle: dotsSixVertical   # pega de arrastar (reordenar refeições no Plano)

dominio:
  dish:       cookingPot
  servings:   users
  time:       clock
  difficulty: chartBar
  technique:  graduationCap

progresso:    # aba Plano · sub-aba Progresso
  weight:  gauge          # peso corporal — mostrador de balança de banheiro
                          # (era balance/scales, que lia como "justiça"; removido)
  logDay:  calendarCheck  # registrar o dia (CTA da TodaySection)
  calendarPattern: calendarDots  # padrão por dia da semana (insight weekdayOver)
  timeline: chartLineUp   # progresso/gráfico

regras:
  - "Navbar: item ativo usa *Fill; inativo usa regular."
  - "Nunca usar Icons.* (Material legado) numa tela — sempre AppIcons.*"
used_by:
  - pitada_tab_bar, recipe_gallery, recipe_detail_bar, recipe_meta
  - recipe_detail_screen, recipe_row, recipe_thumb, recipes_screen
