# ─────────────────────────────────────────────────────────────────────────────
# specs/design-system/colors.yaml
# O QUÊ:  Paleta única do Pitada. Copiada 1:1 do :root de pitada.html.
# GERA:   lib/core/theme/colors.dart  (classe AppColors)
# USADO POR: todo o app. Nenhuma cor pode existir fora daqui.
# ─────────────────────────────────────────────────────────────────────────────
token_class: AppColors
prototype: ":root em pitada.html"

superficie:            # fundos e filetes
  bg:     "#15130E"    # fundo geral do app
  surf:   "#1D1A13"    # superfície de card/campo
  surf2:  "#242017"    # superfície mais clara (input)
  line:   "#29251A"    # filete divisor
  line2:  "#383223"    # filete mais forte / borda

texto:
  text:   "#F2EDE1"    # texto principal
  text2:  "#C5BEAD"    # texto secundário
  muted:  "#8E8674"    # rótulos/menos importante
  faint:  "#605948"    # placeholder / desabilitado

marca:
  accent:      "#C2703F"                 # terracota (destaque, primário)
  accent2:     "#D98C5A"                 # terracota claro (links, "acima")
  sage:        "#A9B26C"                 # verde (sucesso, "dentro da meta")
  accentSoft:  "rgba(194,112,63,0.12)"   # fundo suave terracota
  accentLine:  "rgba(194,112,63,0.32)"   # borda suave terracota
  sageSoft:    "rgba(169,178,108,0.13)"  # fundo suave verde

# cores de miniatura editorial (hero das receitas / pontos de macro)
hero:
  clay:  "#8A5A43"
  moss:  "#5E6B45"
  ochre: "#9A7B3C"
  terra: "#A35C40"
  plum:  "#6E4A5A"
  teal:  "#3F6157"
  rust:  "#9E5236"

# cor de "tinta" sobre o accent (texto de botão primário)
sobre_accent: "#1F0D04"

# —— Tema claro (base CREME, nunca branco; superfícies + texto) ——
# Repensado do zero: a base é creme quente; as superfícies são cremes mais
# claros (jamais #FFF puro). O contraste é suave — papel, não tela branca.
tema_claro:
  bgLight:    "#F4EDDE"   # fundo geral (creme quente — base do modo claro)
  surfLight:  "#FBF6EC"   # card/campo (creme quase-branco, não branco puro)
  surf2Light: "#EFE8D8"   # input (creme um tom abaixo do fundo)
  lineLight:  "#E7DECD"   # filete divisor
  line2Light: "#D8CEB8"   # filete/borda mais forte
  textLight:  "#221E17"
  text2Light: "#6A6252"
  mutedLight: "#938A78"
  faintLight: "#B4AB98"

# Tinta/borda neo-brutalista (usada como pit.border)
ink:
  claro:  "#221E17"   # inkLight
  escuro: "#0E0C08"   # inkDark — quase-preto (o marrom antigo lia como cinza)

# Fundos tingidos por aba (0..4): Receitas, Caderno, Planos, Ingredientes, Perfil
# Cada aba usa o matiz do seu hero (terra/moss/ochre/teal/plum), o MESMO nos
# dois temas; as cinco compartilham S e V idênticos — é isso que faz o conjunto
# combinar. A cor é perceptível, mas o fundo fica SEMPRE abaixo de surf em
# luminosidade: os cards continuam mais claros que o fundo e nada compete.
# CLARO: quase-creme (V ≈ 0.96, S ≈ 0.14) — abaixo de surfLight (#FBF6EC).
tab_bg_light: ["#F5E0D3", "#EAF5D3", "#F5EBD3", "#D3F5EA", "#F5D3E4"]
# ESCURO: quase-preto (V ≈ 0.11, S ≈ 0.56) — abaixo de surf (#1D1A13); o tint
# vem da saturação, não da luminosidade.
tab_bg_dark:  ["#1B120C", "#161B0C", "#1B160C", "#0C1B16", "#1B0C13"]

# Cor do bloco de foto (card) por hero, em cada tema (pastel / escuro)
card_light: {clay: "#F3D3BC", moss: "#D3E0B4", ochre: "#F0DFA9", terra: "#F2C9B4", plum: "#E7CBD6", teal: "#BFE0CE", rust: "#F1C4B0"}
card_dark:  {clay: "#5A3F2E", moss: "#46512F", ochre: "#55482A", terra: "#5E3D2C", plum: "#543742", teal: "#2F4A40", rust: "#5A3A2C"}

# As cores que MUDAM por tema são expostas via ThemeExtension PitadaColors
# (core/theme/pitada_colors.dart), lidas nos widgets como context.pit.<token>.
# Marca (accent/sage) e heros são iguais nos dois temas.

notas:
  - Cores rgba viram Color com opacidade em colors.dart.
  - A lista `hero` é indexável por nome; usada como fundo de miniatura de receita
    e como bolinha de macro (proteína/carbo/gordura).
